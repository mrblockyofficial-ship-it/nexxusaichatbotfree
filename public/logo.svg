<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.3" flood-color="#8b5cf6"/>
    </filter>
  </defs>
  <rect width="200" height="200" rx="48" fill="#0f172a" />
  <g filter="url(#shadow)">
    <!-- Nexxus node paths -->
    <path d="M70 140L70 80L100 110L130 80L130 140" stroke="url(#glow)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M70 80L130 80" stroke="url(#glow)" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.4" />
    <!-- Glowing nodes -->
    <circle cx="100" cy="110" r="14" fill="#ffffff" />
    <circle cx="70" cy="80" r="10" fill="#3b82f6" />
    <circle cx="130" cy="80" r="10" fill="#8b5cf6" />
    <circle cx="70" cy="140" r="10" fill="#3b82f6" />
    <circle cx="130" cy="140" r="10" fill="#8b5cf6" />
  </g>
</svg>